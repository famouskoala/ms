<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Niggery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, Arial, sans-serif;
      background: #0b0b0f;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }
    .card {
      width: 100%;
      max-width: 960px;
      background: linear-gradient(180deg, #13131a 0%, #0f0f15 100%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 56px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 72px;
    }
    .logo {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #ffffff;
    }
    .nav a {
      color: #b8b8c7;
      text-decoration: none;
      margin-left: 24px;
      font-size: 0.95rem;
    }
    .hero {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 40px;
      align-items: center;
    }
    h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      line-height: 0.95;
      margin-bottom: 20px;
    }
    p {
      color: #b8b8c7;
      font-size: 1.05rem;
      line-height: 1.7;
      max-width: 560px;
      margin-bottom: 28px;
    }
    .buttons {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-block;
      padding: 14px 22px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.2s ease;
    }
    .btn-primary {
      background: #ffffff;
      color: #0b0b0f;
    }
    .btn-secondary {
      border: 1px solid rgba(255,255,255,0.12);
      color: #f5f5f5;
      background: transparent;
    }
    .btn:hover { transform: translateY(-1px); }
    .panel {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 22px;
      padding: 28px;
    }
    .badge {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      color: #d6d6e3;
      font-size: 0.85rem;
      margin-bottom: 18px;
    }
    .stat {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .muted {
      color: #9d9dae;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    @media (max-width: 800px) {
      .card { padding: 28px; }
      .nav { margin-bottom: 40px; }
      .hero { grid-template-columns: 1fr; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="nav">
      <div class="nav-links">
        <a href="#about">Niggery never been him </a>
      </div>
    </div>

    <section class="hero">
      <div>
        <h1>Niggery.</h1>
        <p>
         Nigger you have NEVER been him.
        </p>
        <div class="buttons">
          <a class="btn btn-primary" href="#contact">Joey own's you.</a>
          <a class="btn btn-secondary" href="#work">You are a dirty larp.</a>
        </div>
      </div>

      <aside class="panel">
        <div class="muted">
          Mason "Niggery" Sketch is a larper who come's out of Fort Worth Texas, and gets sonned daily by joey.
        </div>
      </aside>
    </section>
  </main>
</body>
</html>
